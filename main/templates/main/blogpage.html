{% extends 'base.html' %}

{% block content %}
{% load static %}
<div>
{% if user.is_authenticated %}
    <a href="{% url 'main:new_blog' %}">새 글 작성하기</a>
{% endif %}
</div>
<div class="card-grid">
     {% for blog in blogs %}
     <div class="card">
          <div class="card-content">
               <h2>{{ blog.title }}</h2>
               <p>{{ blog.summary }}</p>
               <a href="{% url 'main:detail' blog.id %}">자세히 보기</a>
          </div>
          <div class="card-footer">
               <div class="divider"></div>
               <span>{{ blog.writer.profile.nickname }}</span>
          </div>
     </div>
     {% endfor %}
</div>
{% endblock %}
